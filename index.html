<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>JSON Master</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --primary: #006FEE;
      --bg: #F1F5F9;
    }

    html,
    body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      background: var(--bg);
      overflow: hidden;
    }

    #app-root {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #CBD5E1;
      border-radius: 10px;
    }

    /* Layout Base Móvil */
    .tab-pane {
      display: none;
      height: 100%;
      min-height: 0;
      flex-direction: column;
      overflow: hidden;
      background: white;
    }

    .tab-pane.active {
      display: flex;
    }

    .mobile-nav button.active {
      border-bottom: 3px solid var(--primary);
      color: var(--primary);
      font-weight: 800;
    }

    /*
      Móvil: el único .tab-pane visible vive dentro de #workspaceLayout (flex-col + flex-1 + min-h-0).
      Con solo height:100% o un max-height suelto, los hijos flex-1 (árbol, CodeMirror) a veces no
      reciben altura acotada y el layout “revienta”. Aquí el alto viene del flex item (flex + min-height:0)
      y max-height:100% lo ancla al workspace, no al viewport suelto.
    */
    @media (max-width: 1023px) {
      .tab-pane {
        height: auto;
        flex: 1 1 0%;
        min-height: 0;
        max-height: 100%;
      }

      .mobile-nav button {
        padding-top: 0.375rem;
        padding-bottom: 0.375rem;
      }

      .mobile-nav button.active {
        border-bottom-width: 2px;
      }

      .structure-nav-head {
        padding: 0.5rem 0.75rem;
      }

      .structure-nav-head .structure-nav-btn {
        padding: 0.25rem;
      }

      .structure-nav-head .structure-nav-btn .iconify {
        width: 1.125rem;
        height: 1.125rem;
      }
    }

    /* EDITOR: CodeMirror 6 (viewport rendering) */
    .editor-viewport {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      background: #0F172A;
    }

    #cmRoot {
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    #cmRoot .cm-editor {
      height: 100%;
    }

    #cmRoot .cm-scroller {
      font-family: 'Fira Code', monospace;
      font-size: 13px;
    }

    #cmRoot .cm-content {
      caret-color: #38bdf8;
    }

    #cmRoot .cm-cursor,
    #cmRoot .cm-dropCursor {
      border-left-color: #38bdf8 !important;
    }

    #cmRoot .cm-selectionBackground,
    #cmRoot ::selection {
      background: rgba(56, 189, 248, 0.22) !important;
    }

    #cmRoot .cm-activeLine {
      background: rgba(56, 189, 248, 0.06);
    }

    #cmRoot .cm-gutters {
      background: #0b1220;
      border-right: 1px solid rgba(148, 163, 184, 0.12);
    }

    #cmRoot .cm-activeLineGutter {
      background: rgba(56, 189, 248, 0.08);
    }

    .editor-chrome {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px 8px 14px;
      pointer-events: none;
    }

    .editor-chrome>* {
      pointer-events: auto;
    }

    .mac-traffic-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .mac-traffic {
      width: 12px;
      height: 12px;
      border-radius: 9999px;
      border: 1px solid rgba(0, 0, 0, 0.12);
      padding: 0;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    .mac-traffic:hover {
      transform: scale(1.08);
      filter: brightness(1.08);
    }

    .mac-traffic:active {
      transform: scale(0.95);
    }

    .mac-close {
      background: #ff5f57;
      box-shadow: inset 0 0 0 0.5px rgba(255, 255, 255, 0.25);
    }

    .mac-minimize {
      background: #febc2e;
      box-shadow: inset 0 0 0 0.5px rgba(255, 255, 255, 0.25);
    }

    .mac-zoom {
      background: #28c840;
      box-shadow: inset 0 0 0 0.5px rgba(255, 255, 255, 0.25);
    }

    .editor-copy-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(30, 41, 59, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.2);
      color: #94a3b8;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease, transform 0.12s ease;
    }

    .editor-copy-btn:hover {
      background: rgba(51, 65, 85, 0.95);
      color: #38bdf8;
    }

    .editor-copy-btn:active {
      transform: scale(0.94);
    }

    /* Modal confirmación: entrada y salida suaves */
    .confirm-modal {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.3s cubic-bezier(0.22, 1, 0.36, 1),
        visibility 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .confirm-modal.confirm-modal--open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .confirm-modal #confirmBackdrop {
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .confirm-modal.confirm-modal--open #confirmBackdrop {
      opacity: 1;
    }

    .confirm-modal #confirmPanel {
      opacity: 0;
      transform: scale(0.9) translateY(22px);
      filter: blur(4px);
      transition: opacity 0.4s cubic-bezier(0.22, 1, 0.36, 1),
        transform 0.48s cubic-bezier(0.34, 1.25, 0.64, 1),
        filter 0.35s ease-out;
    }

    .confirm-modal.confirm-modal--open #confirmPanel {
      opacity: 1;
      transform: scale(1) translateY(0);
      filter: blur(0);
    }

    @media (prefers-reduced-motion: reduce) {

      .confirm-modal,
      .confirm-modal #confirmBackdrop,
      .confirm-modal #confirmPanel {
        transition-duration: 0.01ms !important;
      }

      .confirm-modal #confirmPanel {
        filter: none !important;
      }
    }

    .editor-cm-wrap {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      padding-top: 44px;
      display: flex;
      flex-direction: column;
    }

    /* GRID ESCRITORIO */
    @media (min-width: 1024px) {
      .mobile-nav {
        display: none !important;
      }

      #workspaceLayout {
        display: grid !important;
        grid-template-columns: 300px 1fr 320px !important;
        gap: 12px !important;
        padding: 12px !important;
        height: calc(100vh - 56px) !important;
        align-items: stretch !important;
      }

      .tab-pane {
        display: flex !important;
        height: 100% !important;
        border-radius: 1rem !important;
        border: 1px solid #e2e8f0 !important;
        box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05) !important;
      }
    }

    /* Dropdowns */
    .custom-dropdown {
      position: relative;
      width: 100%;
    }

    .dropdown-trigger {
      background: white;
      border: 1px solid #E2E8F0;
      padding: 10px 12px;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
    }

    .dropdown-menu {
      position: absolute;
      bottom: calc(100% + 4px);
      left: 0;
      width: 100%;
      background: white;
      border: 1px solid #E2E8F0;
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
      display: none;
      z-index: 100;
      overflow: hidden;
    }

    .dropdown-menu.active {
      display: block;
    }

    .dropdown-item {
      padding: 10px 12px;
      cursor: pointer;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dropdown-item:hover {
      background: #F8FAFC;
      color: var(--primary);
    }

    .rule-card {
      background: #F8FAFC;
      border: 1px solid #E2E8F0;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 12px;
    }

    #emptyState.hidden {
      display: none !important;
    }
  </style>
</head>

<body>

  <div id="app-root">
    <!-- Header -->
    <header class="h-14 border-b border-slate-200 bg-white px-4 flex items-center justify-between shrink-0 z-[100]">
      <div class="flex items-center gap-2 cursor-pointer" onclick="showDashboard()">
        <span class="iconify text-blue-600 w-6 h-6" data-icon="solar:programming-linear"></span>
        <h1 class="text-[10px] font-black uppercase tracking-tighter">JSON<span class="text-blue-600">Master</span></h1>
      </div>

      <div id="topActions" class="hidden flex items-center gap-2">
        <button onclick="saveChanges()"
          class="bg-emerald-500 text-white p-2.5 rounded-xl active:scale-90 transition-transform">
          <span class="iconify w-5 h-5" data-icon="solar:diskette-linear"></span>
        </button>
        <button onclick="exportJSON()"
          class="bg-slate-900 text-white p-2.5 rounded-xl active:scale-90 transition-transform">
          <span class="iconify w-5 h-5" data-icon="solar:download-minimalistic-linear"></span>
        </button>
      </div>
    </header>

    <!-- DASHBOARD -->
    <section id="dashboardView" class="flex-1 overflow-y-auto p-5 custom-scrollbar bg-slate-50">
      <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-end mb-8">
          <div>
            <h2 class="text-2xl font-black text-slate-800 tracking-tight">Proyectos Locales</h2>
            <p class="text-[11px] text-slate-400 font-medium">Gestiona tus archivos JSON en el navegador.
            </p>
          </div>
          <button onclick="document.getElementById('fileInput').click()"
            class="bg-blue-600 text-white p-4 rounded-2xl shadow-xl shadow-blue-100 active:scale-95 transition-all">
            <span class="iconify w-6 h-6" data-icon="solar:add-circle-linear"></span>
          </button>
          <input type="file" id="fileInput" class="hidden" accept=".json">
        </div>
        <div id="projectGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5"></div>
      </div>
    </section>

    <!-- WORKSPACE -->
    <main id="editorView" class="hidden flex-1 flex flex-col min-h-0 overflow-hidden relative">

      <div id="emptyState"
        class="absolute inset-0 z-[150] flex flex-col items-center justify-center bg-slate-50/90 backdrop-blur-sm p-6 text-center">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl border border-slate-100 max-w-sm">
          <span class="iconify w-16 h-16 text-slate-200 mx-auto mb-6" data-icon="solar:file-corrupted-linear"></span>
          <h3 class="font-black text-slate-800 mb-2 uppercase text-[10px] tracking-widest">Archivo no activo
          </h3>
          <p class="text-[11px] text-slate-400 mb-8 px-4">Regresa al dashboard para cargar un archivo JSON.
          </p>
          <button onclick="showDashboard()"
            class="w-full bg-slate-900 text-white py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest active:scale-95 transition-transform">Dashboard</button>
        </div>
      </div>

      <!-- Mobile Nav -->
      <nav class="mobile-nav flex bg-white border-b border-slate-200 shrink-0">
        <button onclick="switchTab('tree')" id="btn-tree"
          class="flex-1 py-4 text-[10px] font-bold uppercase active">Estructura</button>
        <button onclick="switchTab('edit')" id="btn-edit"
          class="flex-1 py-4 text-[10px] font-bold uppercase">Editor</button>
        <button onclick="switchTab('tools')" id="btn-tools"
          class="flex-1 py-4 text-[10px] font-bold uppercase">Herramientas</button>
      </nav>

      <div id="workspaceLayout" class="flex-1 flex flex-col min-h-0 overflow-hidden">
        <!-- Estructura -->
        <aside id="pane-tree" class="tab-pane active border-r max-lg:max-h-[180px]">
          <div
            class="structure-nav-head p-4 border-b flex justify-between items-center bg-slate-50/50 shrink-0 leading-none">
            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Navegación</span>
            <div class="flex gap-0.5 items-center">
              <button type="button" onclick="expandAll()"
                class="structure-nav-btn text-slate-400 p-1.5 rounded-lg active:scale-95 transition-transform"><span
                  class="iconify w-5 h-5" data-icon="solar:maximize-square-linear"></span></button>
              <button type="button" onclick="collapseAll()"
                class="structure-nav-btn text-slate-400 p-1.5 rounded-lg active:scale-95 transition-transform"><span
                  class="iconify w-5 h-5" data-icon="solar:minimize-square-linear"></span></button>
            </div>
          </div>
          <div id="treeViewport" class="flex-1 overflow-auto relative custom-scrollbar bg-white">
            <div id="treeRunway" class="absolute w-full pointer-events-none"></div>
            <div id="treeContent" class="absolute w-full"></div>
          </div>
        </aside>

        <!-- Editor -->
        <section id="pane-edit" class="tab-pane bg-white flex flex-col min-h-0">
          <div class="p-4 border-b flex justify-between items-center gap-2 shrink-0">
            <div class="flex flex-col min-w-0 flex-1">
              <span id="currentPath" class="text-[11px] font-mono font-bold text-blue-600 truncate">/root</span>
              <span id="nodeInfo" class="text-[9px] text-slate-400 uppercase font-black tracking-tighter">Nodo
                raíz</span>
            </div>
            <div class="flex items-center gap-1.5 shrink-0">
              <button type="button" onclick="clearNodeValue()" title="Limpiar valor del nodo"
                class="w-9 h-9 flex items-center justify-center text-slate-300 hover:text-amber-500 hover:bg-amber-50 transition-colors rounded-xl active:scale-90"><span
                  class="iconify w-5 h-5" data-icon="solar:eraser-linear"></span></button>
              <button type="button" onclick="deleteNode()"
                class="w-9 h-9 flex items-center justify-center text-slate-300 hover:text-red-500 hover:bg-red-50 transition-colors rounded-xl active:scale-90"><span
                  class="iconify w-5 h-5" data-icon="solar:trash-bin-trash-linear"></span></button>
            </div>
          </div>
          <div id="editorUI" class="p-3 bg-slate-50 border-b shrink-0"></div>
          <div id="editorContainer" class="editor-viewport">
            <div class="editor-chrome">
              <div class="mac-traffic-group" role="group" aria-label="Controles de ventana">
                <button type="button" class="mac-traffic mac-close" onclick="editorMacClose()"
                  title="Cerrar y volver al dashboard" aria-label="Cerrar"></button>
                <button type="button" class="mac-traffic mac-minimize" onclick="editorMacMinimize()"
                  title="Ir a estructura" aria-label="Minimizar"></button>
                <button type="button" class="mac-traffic mac-zoom" onclick="editorMacZoom()" title="Pantalla completa"
                  aria-label="Zoom"></button>
              </div>
              <button type="button" class="editor-copy-btn" onclick="copyPreviewJson()" title="Copiar JSON"
                aria-label="Copiar JSON">
                <span class="iconify w-5 h-5" data-icon="solar:copy-linear"></span>
              </button>
            </div>
            <div class="editor-cm-wrap">
              <div id="cmRoot"></div>
            </div>
          </div>
        </section>

        <!-- Herramientas -->
        <aside id="pane-tools" class="tab-pane border-l">
          <div class="p-4 border-b bg-slate-50/50 text-[10px] font-black text-slate-400 uppercase tracking-widest">
            Utilidades Masivas</div>
          <div id="bulkToolsContent" class="flex-1 overflow-y-auto p-4 custom-scrollbar space-y-6">
            <div class="space-y-3">
              <h3 class="text-[10px] font-black text-slate-500 uppercase flex items-center gap-2">
                <span class="iconify" data-icon="solar:graph-linear"></span> Esquema Detectado
              </h3>
              <div id="schemaExplorer" class="grid grid-cols-2 gap-2"></div>
            </div>
            <div class="space-y-3">
              <div class="flex justify-between items-center">
                <h3 class="text-[10px] font-black text-slate-500 uppercase flex items-center gap-2">
                  <span class="iconify" data-icon="solar:magic-stick-linear"></span> Reglas de
                  Transformación
                </h3>
                <button onclick="addRule()" class="text-blue-600 text-[9px] font-black underline">+
                  AÑADIR</button>
              </div>
              <div id="rulesList" class="space-y-3"></div>
            </div>
          </div>
          <div class="p-4 border-t bg-white">
            <button onclick="applyMassive()" id="btnApplyBulk"
              class="w-full bg-slate-900 text-white py-4 rounded-2xl text-[11px] font-black uppercase tracking-widest active:scale-95 shadow-lg">
              Procesar Array
            </button>
          </div>
        </aside>
      </div>
    </main>
  </div>

  <!-- Toast UI -->
  <div id="toast"
    class="fixed bottom-10 left-1/2 -translate-x-1/2 translate-y-20 opacity-0 transition-all duration-300 z-[1000]">
    <div
      class="bg-slate-900 text-white px-6 py-4 rounded-[1.25rem] shadow-2xl flex items-center gap-3 font-bold text-[11px]">
      <span id="toastIcon" class="iconify text-blue-400 w-5 h-5"></span>
      <span id="toastMsg"></span>
    </div>
  </div>

  <!-- Modal de confirmación -->
  <div id="confirmModal" class="confirm-modal fixed inset-0 z-[2000] flex items-center justify-center p-4"
    aria-modal="true" role="dialog" aria-labelledby="confirmTitle" aria-hidden="true">
    <div id="confirmBackdrop" class="absolute inset-0 bg-slate-900/55"></div>
    <div id="confirmPanel"
      class="relative z-10 w-full max-w-sm bg-white rounded-[1.5rem] shadow-2xl border border-slate-100/80 overflow-hidden ring-1 ring-slate-900/5">
      <div class="p-6 pt-5">
        <div class="flex gap-3 mb-3">
          <span id="confirmIconWrap"
            class="shrink-0 w-11 h-11 rounded-2xl bg-blue-50 text-blue-600 flex items-center justify-center">
            <span id="confirmIcon" class="iconify w-6 h-6" data-icon="solar:question-circle-linear"></span>
          </span>
          <div class="min-w-0 flex-1 pt-0.5">
            <h2 id="confirmTitle" class="text-sm font-black text-slate-800 tracking-tight leading-tight">Confirmar</h2>
            <p id="confirmMessage" class="text-[11px] text-slate-500 font-medium mt-1.5 leading-relaxed"></p>
          </div>
        </div>
        <div class="flex gap-2 mt-5">
          <button type="button" id="confirmCancelBtn"
            class="flex-1 py-3.5 rounded-xl text-[10px] font-black uppercase tracking-wider text-slate-600 bg-slate-100 hover:bg-slate-200 active:scale-[0.98] transition-all">
            Cancelar
          </button>
          <button type="button" id="confirmOkBtn"
            class="flex-1 py-3.5 rounded-xl text-[10px] font-black uppercase tracking-wider text-white bg-blue-600 hover:bg-blue-700 active:scale-[0.98] transition-all">
            Aceptar
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const STORE_KEY = 'json_master_v39_storage';
    let jsonDb = {};
    let currentProjectName = "";
    let currentPathStr = "";
    let expandedPaths = new Set();
    let flatTree = [];

    const NODE_H = window.innerWidth < 1024 ? 40 : 48;

    const ACTIONS = [
      { id: 'uuid', label: 'ID Único (UUID)', icon: 'solar:hashtag-square-linear' },
      { id: 'date', label: 'Fecha ISO 8601', icon: 'solar:calendar-linear' },
      { id: 'timestamp', label: 'Timestamp ms', icon: 'solar:clock-circle-linear' },
      { id: 'to_str', label: 'Convertir a Texto', icon: 'solar:text-field-linear' },
      { id: 'to_num', label: 'Convertir a Número', icon: 'solar:sort-vertical-linear' },
      { id: 'custom', label: 'Valor Personalizado', icon: 'solar:pen-linear' }
    ];

    const getStore = () => JSON.parse(localStorage.getItem(STORE_KEY) || '{}');
    const saveStore = (name, data) => {
      const p = getStore();
      p[name] = { data, date: new Date().toISOString(), size: JSON.stringify(data).length };
      localStorage.setItem(STORE_KEY, JSON.stringify(p));
      renderDashboard();
    };

    function switchTab(t) {
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.mobile-nav button').forEach(b => b.classList.remove('active'));
      document.getElementById('pane-' + t).classList.add('active');
      document.getElementById('btn-' + t).classList.add('active');
      if (t === 'edit') setTimeout(() => window.__jsonCm?.refreshLayout?.(), 50);
      if (t === 'tree') setTimeout(renderTree, 50);
    }

    function showDashboard() {
      document.getElementById('dashboardView').classList.remove('hidden');
      document.getElementById('editorView').classList.add('hidden');
      document.getElementById('topActions').classList.add('hidden');
      renderDashboard();
    }

    function openProject(name) {
      const p = getStore()[name];
      if (!p) return;
      currentProjectName = name;
      jsonDb = p.data;
      document.getElementById('dashboardView').classList.add('hidden');
      document.getElementById('editorView').classList.remove('hidden');
      document.getElementById('topActions').classList.remove('hidden');
      document.getElementById('emptyState').classList.add('hidden');
      expandedPaths.clear();
      refreshTree();
      selectNode("");
      if (window.innerWidth < 1024) switchTab('tree');
    }

    function iconForJsonValue(val) {
      if (val === null) return 'solar:close-circle-linear';
      if (Array.isArray(val)) return 'solar:layers-minimalistic-linear';
      if (typeof val === 'object') return 'solar:box-minimalistic-linear';
      if (typeof val === 'number') return 'solar:hashtag-square-linear';
      if (typeof val === 'boolean') return 'solar:check-read-linear';
      return 'solar:text-field-linear';
    }

    function escapeHtmlText(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function refreshTree() {
      flatTree = [];
      const walk = (obj, path = "", level = 0) => {
        if (!obj || typeof obj !== 'object') return;
        Object.keys(obj).forEach(k => {
          const full = path ? `${path}.${k}` : k;
          const val = obj[k];
          const isColl = val && typeof val === 'object';
          flatTree.push({
            k,
            full,
            level,
            isColl,
            hasChildren: isColl && Object.keys(val).length > 0,
            val
          });
          if (isColl && expandedPaths.has(full)) walk(val, full, level + 1);
        });
      };
      walk(jsonDb);
      document.getElementById('treeRunway').style.height = `${flatTree.length * NODE_H}px`;
      renderTree();

    function treeRowActivate(el) {
      selectNode(decodeURIComponent(el.dataset.path || ''));
    }

    function treeToggleExpand(ev, el) {
      ev.stopPropagation();
      toggleNode(decodeURIComponent(el.dataset.path || ''));
    }

    function renderTree() {
      const vp = document.getElementById('treeViewport');
      const cont = document.getElementById('treeContent');
      if (!vp || !cont) return;
      const st = vp.scrollTop;
      const start = Math.max(0, Math.floor(st / NODE_H) - 5);
      const end = Math.min(flatTree.length, Math.ceil((vp.clientHeight + st) / NODE_H) + 5);
      cont.style.transform = `translateY(${start * NODE_H}px)`;
      cont.innerHTML = flatTree.slice(start, end).map(n => {
        const enc = encodeURIComponent(n.full);
        const icon = iconForJsonValue(n.val);
        const keyHtml = escapeHtmlText(n.k);
        const toggleCol = n.hasChildren
          ? `<span class="w-8 h-full flex items-center justify-center -ml-2 text-slate-300 shrink-0" data-path="${enc}" onclick="treeToggleExpand(event, this)">
                        <span class="iconify ${expandedPaths.has(n.full) ? 'rotate-90' : ''}" data-icon="solar:alt-arrow-right-linear"></span>
                    </span>`
          : `<span class="w-8 h-full flex items-center justify-center -ml-2 shrink-0 pointer-events-none"></span>`;
        return `
                <div class="flex items-center h-[48px] max-lg:h-[40px] px-4 border-b border-slate-50 transition-all bg-white cursor-pointer" 
                     style="padding-left: ${n.level * 16 + 12}px" data-path="${enc}" onclick="treeRowActivate(this)">
                    ${toggleCol}
                    <span class="iconify mr-2 ${currentPathStr === n.full ? 'text-blue-700' : 'text-slate-400'} w-4 h-4 shrink-0" data-icon="${icon}"></span>
                    <span class="truncate font-mono text-[11px] ${currentPathStr === n.full ? 'text-blue-700 font-bold' : 'text-slate-600'}">${keyHtml}</span>

    document.getElementById('treeViewport').onscroll = renderTree;

    function selectNode(path) {
      currentPathStr = path;
      document.getElementById('currentPath').innerText = path || "/root";

      const info = document.getElementById('nodeInfo');
      if (Array.isArray(data)) info.innerText = `Colección: ${data.length} elementos`;
      else if (data && typeof data === 'object') info.innerText = `Objeto: ${Object.keys(data).length} props`;
      else info.innerText = `Tipo: ${typeof data}`;
      buildEditorUI(data);
      buildSchemaExplorer(data);
      if (window.__jsonCm) {

    async function copyPreviewJson() {
      const text = window.__jsonCm ? window.__jsonCm.getText() : '';

        await navigator.clipboard.writeText(text);
        showToast('JSON copiado al portapapeles', 'solar:copy-linear');
      } catch (err) {
        const fallback = document.createElement('textarea');
        fallback.value = text;
        fallback.setAttribute('readonly', '');
        fallback.style.position = 'fixed';
        fallback.style.left = '-9999px';

    function addRule(prop = "") {

    function selectAction(id, act, label, icon) {

      const customInput = document.getElementById(`custom-val-container-${id}`);
      if (act === 'custom') customInput.classList.remove('hidden');
      else customInput.classList.add('hidden');

    function applyMassive() {
      const target = getByPath(jsonDb, currentPathStr);
      if (!Array.isArray(target)) { showToast("Debes seleccionar un Array", "solar:danger-linear"); return; }
      const rules = Array.from(document.querySelectorAll('#rulesList > .rule-card'));
      if (rules.length === 0) return;
      target.forEach(item => {
        if (!item || typeof item !== 'object') return;
        rules.forEach(r => {
          const field = r.querySelector('input').value;
          const action = r.dataset.action;
          if (!field) return;
          let curVal = getByPath(item, field);
          let newVal;
          switch (action) {
            case 'uuid': newVal = crypto.randomUUID(); break;
            case 'date': newVal = new Date().toISOString(); break;
            case 'timestamp': newVal = Date.now(); break;
            case 'to_str': newVal = String(curVal); break;
            case 'to_num': newVal = Number(curVal) || 0; break;
            case 'custom': newVal = r.querySelector(`div[id^="custom-val-container"] input`).value; break;
          }
          setByPath(item, field, newVal);
        });
      });
      saveStore(currentProjectName, jsonDb);
      showToast("Procesamiento completado", "solar:magic-stick-linear");
      selectNode(currentPathStr);
    }

    function buildSchemaExplorer(data) {
      const exp = document.getElementById('schemaExplorer');
      exp.innerHTML = "";
      if (!Array.isArray(data) || data.length === 0) return;
      const keys = new Set();
      data.slice(0, 30).forEach(i => { if (i && typeof i === 'object') Object.keys(i).forEach(k => keys.add(k)); });
      keys.forEach(k => {
        const b = document.createElement('button');
        b.className = "p-2 bg-white border border-slate-100 rounded-xl text-[9px] font-mono text-left truncate hover:bg-blue-50";
        b.innerHTML = `<span class="text-blue-500 mr-1">#</span>${k}`;
        b.onclick = () => addRule(k);
        exp.appendChild(b);
      });
    }

    function buildEditorUI(data) {
      const ui = document.getElementById('editorUI');
      if (data && typeof data === 'object' && !Array.isArray(data)) {

              <input type="text" id="newPropValInp" placeholder="Valor (JSON: 42, true, null, [], {})"
                class="flex-1 min-w-0 bg-white border border-slate-200 rounded-xl px-3 py-2 text-[10px] font-mono outline-none focus:ring-2 focus:ring-blue-100">
                <button type="button" onclick="addObjectProperty()"

        ui.innerHTML = "";
      }
    }

    function parseValueInput(raw) {
      const t = (raw ?? '').trim();
      if (t === '') return '';

        return JSON.parse(t);
      } catch {
        return raw;
      }
    }

    function addObjectProperty() {
      const keyInp = document.getElementById('newPropKeyInp');
      const valInp = document.getElementById('newPropValInp');
      if (!keyInp || !valInp) return;
      const key = keyInp.value.trim();
      if (!key) {
        showToast('Escribe el nombre de la propiedad', 'solar:danger-linear');
        return;
      }
      const target = getByPath(jsonDb, currentPathStr);
      if (!target || typeof target !== 'object' || Array.isArray(target)) {
        showToast('Solo puedes añadir propiedades en un objeto', 'solar:danger-linear');
        return;
      }
      if (Object.prototype.hasOwnProperty.call(target, key)) {
        showToast('Ya existe una propiedad con ese nombre', 'solar:danger-linear');
        return;
      }
      target[key] = parseValueInput(valInp.value);
      saveStore(currentProjectName, jsonDb);
      showToast('Propiedad añadida', 'solar:check-circle-linear');
      keyInp.value = '';
      valInp.value = '';
      refreshTree();
      selectNode(currentPathStr);
    }

    function emptyShellForValue(sample) {
      if (sample === null || sample === undefined) return null;
      if (Array.isArray(sample)) return [];
      if (typeof sample === 'object') return {};
      if (typeof sample === 'number') return 0;
      if (typeof sample === 'boolean') return false;
      if (typeof sample === 'string') return '';
      return null;
    }

    function clearNodeValue() {
      showConfirm({
        title: 'Limpiar nodo',
        message: 'El valor se restablecerá al vacío según el tipo: texto \"\", número 0, booleano false, null, objeto {}, arreglo [].',
        confirmLabel: 'Limpiar',
        cancelLabel: 'Cancelar',
        danger: true,
        icon: 'solar:eraser-linear'
      }).then((ok) => {
        if (!ok) return;
        const cur = getByPath(jsonDb, currentPathStr);
        const next = emptyShellForValue(cur);
        if (currentPathStr === '') {
          jsonDb = next;
        } else {
          setByPath(jsonDb, currentPathStr, next);
        }
        saveStore(currentProjectName, jsonDb);
        showToast('Nodo limpiado', 'solar:eraser-linear');
        refreshTree();
        selectNode(currentPathStr);
      });
    }
    function toggleDropdown(id) { document.querySelectorAll('.dropdown-menu').forEach(m => { if (m.id !== 'menu-' + id) m.classList.remove('active'); }); document.getElementById('menu-' + id).classList.toggle('active'); }

    function formatSizeFromBytes(bytes) {
      if (bytes === 0) return "0 B";

      const units = ["B", "KB", "MB", "GB", "TB"];
      const k = 1024;

      const i = Math.floor(Math.log(bytes) / Math.log(k));
      const size = bytes / Math.pow(k, i);

      return `${size.toFixed(size < 10 ? 2 : 1)} ${units[i]}`;
    }

    function renderDashboard() {
      const p = getStore();
      const grid = document.getElementById('projectGrid');
      grid.innerHTML = "";
      Object.keys(p).forEach(name => {
        const item = p[name];
        const div = document.createElement('div');
        div.className = "bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm hover:shadow-md cursor-pointer group transition-all";
        div.onclick = () => openProject(name);
        div.innerHTML = `
                    <div class="w-12 h-12 bg-blue-600 text-slate-300 group-hover:text-white rounded-2xl flex items-center justify-center transition-colors mb-4">
                        <span class="iconify w-6 h-6" data-icon="solar:file-text-linear"></span>
                    </div>
                    <h3 class="text-sm font-black text-slate-800 truncate">${name}</h3>
                    <div class="flex justify-between items-center mt-3 pt-3 border-t border-slate-50">
                        <span class="text-[9px] font-bold text-slate-400 uppercase">${formatSizeFromBytes(item.size)}</span>
                        <button onclick="event.stopPropagation(); deleteProject('${name}')" class="text-slate-300 hover:text-red-500 transition-colors">
                            <span class="iconify w-5 h-5" data-icon="solar:trash-bin-trash-linear"></span>
                        </button>
                    </div>
                `;
        grid.appendChild(div);
      });
    }

    function deleteProject(n) {
      showConfirm({
        title: 'Eliminar proyecto',
        message: 'Se borrará del almacenamiento local del navegador. No se puede deshacer.',
        confirmLabel: 'Eliminar',
        cancelLabel: 'Cancelar',
        danger: true,
        icon: 'solar:trash-bin-trash-linear'
      }).then((ok) => {
        if (!ok) return;
        const p = getStore();
        delete p[n];
        localStorage.setItem(STORE_KEY, JSON.stringify(p));
        renderDashboard();
      });
    }
    function saveChanges() {
      if (!window.__jsonCm) return;
      try {
        const parsed = JSON.parse(window.__jsonCm.getText());
        if (currentPathStr === "") jsonDb = parsed;
        else setByPath(jsonDb, currentPathStr, parsed);
        saveStore(currentProjectName, jsonDb);
        showToast("Guardado", "solar:check-circle-linear");
        refreshTree();
        selectNode(currentPathStr);
      } catch (e) { showToast("JSON Inválido", "solar:danger-linear"); }
    }
    function deleteNode() {
      showConfirm({
        title: 'Eliminar nodo',
        message: 'Este elemento se quitará del JSON. La raíz pasará a quedar vacía si era el único contenido.',
        confirmLabel: 'Eliminar',
        cancelLabel: 'Cancelar',
        danger: true,
        icon: 'solar:trash-bin-trash-linear'
      }).then((ok) => {
        if (!ok) return;
        const parts = currentPathStr.split('.');
        const last = parts.pop();
        const parent = parts.length ? getByPath(jsonDb, parts.join('.')) : jsonDb;
        Array.isArray(parent) ? parent.splice(Number(last), 1) : delete parent[last];
        currentPathStr = "";
        saveStore(currentProjectName, jsonDb);
        refreshTree();
        selectNode("");
      });
    }
    function getByPath(obj, path) { if (!path) return obj; return path.split('.').reduce((acc, part) => (acc && acc[part] !== undefined) ? acc[part] : undefined, obj); }
    function setByPath(obj, path, value) { const parts = path.split('.'); const last = parts.pop(); const parent = parts.reduce((acc, part) => { if (acc[part] == null) acc[part] = {}; return acc[part]; }, obj); parent[last] = value; }
    function toggleNode(p) { expandedPaths.has(p) ? expandedPaths.delete(p) : expandedPaths.add(p); refreshTree(); }
    function expandAll() { const f = (o, p = "") => { if (o && typeof o === 'object') Object.keys(o).forEach(k => { const path = p ? `${p}.${k}` : k; expandedPaths.add(path); f(o[k], path); }); }; f(jsonDb); refreshTree(); }
    function collapseAll() { expandedPaths.clear(); refreshTree(); }
    let confirmResolver = null;

    function showConfirm(options) {
      return new Promise((resolve) => {
        const modal = document.getElementById('confirmModal');
        const wasOpen = modal.classList.contains('confirm-modal--open');

        if (confirmResolver) {
          try { confirmResolver(false); } catch (e) { /* noop */ }
        }
        confirmResolver = resolve;

        if (wasOpen) {
          modal.classList.remove('confirm-modal--open');
          void modal.offsetWidth;
        }

        const titleEl = document.getElementById('confirmTitle');
        const msgEl = document.getElementById('confirmMessage');
        const okBtn = document.getElementById('confirmOkBtn');
        const cancelBtn = document.getElementById('confirmCancelBtn');
        const iconWrap = document.getElementById('confirmIconWrap');
        const iconEl = document.getElementById('confirmIcon');

        titleEl.textContent = options.title || 'Confirmar';
        msgEl.textContent = options.message || '';
        okBtn.textContent = options.confirmLabel || 'Aceptar';
        cancelBtn.textContent = options.cancelLabel || 'Cancelar';

        const danger = !!options.danger;
        if (danger) {
          iconWrap.className = 'shrink-0 w-11 h-11 rounded-2xl bg-red-50 text-red-600 flex items-center justify-center';
          okBtn.className = 'flex-1 py-3.5 rounded-xl text-[10px] font-black uppercase tracking-wider text-white bg-red-500 hover:bg-red-600 active:scale-[0.98] transition-all';
        } else {
          iconWrap.className = 'shrink-0 w-11 h-11 rounded-2xl bg-blue-50 text-blue-600 flex items-center justify-center';
          okBtn.className = 'flex-1 py-3.5 rounded-xl text-[10px] font-black uppercase tracking-wider text-white bg-blue-600 hover:bg-blue-700 active:scale-[0.98] transition-all';
        }
        iconEl.setAttribute('data-icon', options.icon || (danger ? 'solar:danger-linear' : 'solar:question-circle-linear'));

        const runOpen = () => {
          modal.setAttribute('aria-hidden', 'false');
          modal.classList.add('confirm-modal--open');
          if (typeof Iconify !== 'undefined' && Iconify.scan) Iconify.scan();
          okBtn.focus();
        };

        requestAnimationFrame(() => requestAnimationFrame(runOpen));
      });
    }

    function finishConfirm(value) {
      const modal = document.getElementById('confirmModal');
      const r = confirmResolver;
      confirmResolver = null;
      if (r) r(value);
      modal.classList.remove('confirm-modal--open');
      modal.setAttribute('aria-hidden', 'true');
    }

    (function initConfirmModal() {
      document.getElementById('confirmCancelBtn').onclick = () => finishConfirm(false);
      document.getElementById('confirmOkBtn').onclick = () => finishConfirm(true);
      document.getElementById('confirmBackdrop').onclick = () => finishConfirm(false);
      document.addEventListener('keydown', (e) => {
        if (e.key !== 'Escape') return;
        const m = document.getElementById('confirmModal');
        if (!confirmResolver || !m.classList.contains('confirm-modal--open')) return;
        e.preventDefault();
        finishConfirm(false);
      });
    })();

    function showToast(m, i) { const t = document.getElementById('toast'); document.getElementById('toastMsg').innerText = m; document.getElementById('toastIcon').setAttribute('data-icon', i); t.classList.remove('translate-y-20', 'opacity-0'); setTimeout(() => t.classList.add('translate-y-20', 'opacity-0'), 2500); }
    function exportJSON() { const b = new Blob([JSON.stringify(jsonDb, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `edit_${currentProjectName}`; a.click(); }

    document.getElementById('fileInput').onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          saveStore(file.name, data);
          openProject(file.name);
        } catch (err) { showToast("Error JSON", "solar:danger-linear"); }
      };
      reader.readAsText(file);
    };

    window.onclick = (e) => { if (!e.target.closest('.custom-dropdown')) document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('active')); };
    window.onload = () => {
      renderDashboard();
      window.__jsonCm?.refreshLayout?.();
    };

    window.__onJsonCmReady = () => {
      window.__jsonCm?.refreshLayout?.();
    };

      });

      const host = document.getElementById("editorContainer");
      if (host) {
        new ResizeObserver(() => view.requestMeasure()).observe(host);
      }

      window.__jsonCm = {
        getText: () => view.state.doc.toString(),
        setDoc: (text) => {
          view.setState(
            EditorState.create({
              doc: text,
              extensions: buildExtensions(),
            })
          );
          requestAnimationFrame(() => {
            view.scrollDOM.scrollTop = 0;
            view.scrollDOM.scrollLeft = 0;
          });
        },
        refreshLayout: () => view.requestMeasure(),
        focus: () => view.focus(),
      };

      if (typeof window.__onJsonCmReady === "function") {
        window.__onJsonCmReady();
      }
    }
  </script>
</body>

</html>
